# =============================================================
# no_output_timeout の再現用 CircleCI config.yml
# =============================================================
#
# このファイルは、CircleCI の出力なしタイムアウト（no_output_timeout）の
# 挙動を確認するためのサンプルです（30秒に短縮したクイック再現と、
# no_output_timeout 未指定＝既定10分での再現の両方を含みます）。
#
# 使い方:
#   1. 任意の GitHub/GitLab リポジトリに .circleci/config.yml として配置
#   2. CircleCI でプロジェクトをセットアップ
#   3. パイプラインを実行
#
# 期待される結果:
#   - reproduce-timeout ジョブ: 30秒後にタイムアウトで失敗（no_output_timeout 短縮のクイック再現）
#   - reproduce-timeout-fixed ジョブ: 正常に完了
#   - reproduce-timeout-with-progress ジョブ: 正常に完了
#   - reproduce-timeout-default-10m ジョブ: no_output_timeout 未指定（既定10分）で
#     最後のログのあと約10分無出力のため「Too long with no output」で失敗（ステップ所要おおよそ10〜11分）
#   - reproduce-timeout-fixed-default-10m ジョブ: no_output_timeout: 12m で正常に完了（同上くらいの時間）
#
# ⚠️ クイック用ジョブは no_output_timeout を 30s に短縮しています。
#    デフォルト10分の再現ジョブはパイプライン全体で約10分以上かかります。
# =============================================================

version: 2.1

jobs:
  # -------------------------------------------------------
  # ❌ タイムアウトが発生するジョブ
  # -------------------------------------------------------
  reproduce-timeout:
    docker:
      - image: cimg/node:22.0
    steps:
      - run:
          name: 出力なしタイムアウトを再現（30秒で発動）
          # no_output_timeout を 30秒に短縮して素早く再現する
          no_output_timeout: 30s
          command: |
            echo "=== タイムアウト再現テスト ==="
            echo "このメッセージの後、60秒間 stdout に何も出力しません..."
            echo "30秒後に 'Too long with no output' エラーが発生するはずです"
            echo "---"
            # 60秒間、一切の出力なしでスリープ
            node -e "setTimeout(() => console.log('完了'), 60000)"

  # -------------------------------------------------------
  # ✅ no_output_timeout を延長して解決したジョブ
  # -------------------------------------------------------
  reproduce-timeout-fixed:
    docker:
      - image: cimg/node:22.0
    steps:
      - run:
          name: タイムアウトを延長して解決
          # 出力なし時間（60秒）より長い 2分に設定
          no_output_timeout: 2m
          command: |
            echo "=== タイムアウト延長テスト ==="
            echo "60秒間出力がありませんが、no_output_timeout: 2m なので成功します"
            echo "---"
            node -e "setTimeout(() => console.log('60秒後に出力 → 成功！'), 60000)"

  # -------------------------------------------------------
  # ✅ 定期的な出力で回避するパターン
  # -------------------------------------------------------
  reproduce-timeout-with-progress:
    docker:
      - image: cimg/node:22.0
    steps:
      - run:
          name: 定期的なログ出力でタイムアウトを回避
          no_output_timeout: 30s
          command: |
            echo "=== 定期出力パターン ==="
            echo "10秒ごとにログを出力するため、タイムアウトしません"
            echo "---"
            # 10秒ごとに進捗を出力する Node.js スクリプト
            node -e "
              const total = 60;
              let elapsed = 0;
              const interval = setInterval(() => {
                elapsed += 10;
                console.log('[' + elapsed + '/' + total + 's] 処理中...');
                if (elapsed >= total) {
                  clearInterval(interval);
                  console.log('完了！');
                }
              }, 10000);
            "

  # -------------------------------------------------------
  # ❌ デフォルト no_output_timeout（10分）— Too long with no output を再現
  #     run に no_output_timeout を書かない（CircleCI 既定の 10 分）
  # -------------------------------------------------------
  reproduce-timeout-default-10m:
    docker:
      - image: cimg/node:22.0
    steps:
      - run:
          name: 既定10分・無出力で Too long with no output を再現（所要おおよそ10〜11分）
          # no_output_timeout を省略 → 公式デフォルト（10分）が適用される
          command: |
            echo "=== デフォルト no_output_timeout（10分）での再現 ==="
            echo "このあと 11 分間 stdout に一切出力しません。"
            echo "最後の出力から約 10 分で 'Too long with no output' になる想定です。"
            echo "---"
            node -e "setTimeout(() => console.log('完了（通常はここまで到達しない）'), 660000)"

  reproduce-timeout-fixed-default-10m:
    docker:
      - image: cimg/node:22.0
    steps:
      - run:
          name: 12分に延長して11分の無出力を許容
          no_output_timeout: 12m
          command: |
            echo "=== no_output_timeout: 12m（11分無出力でも成功） ==="
            echo "---"
            node -e "setTimeout(() => console.log('11分後に出力 → 成功！'), 660000)"

workflows:
  test-no-output-timeout:
    jobs:
      - reproduce-timeout                  # ❌ 30秒でタイムアウト（クイック再現）
      - reproduce-timeout-fixed            # ✅ タイムアウト延長で成功
      - reproduce-timeout-with-progress    # ✅ 定期出力で回避
      - reproduce-timeout-default-10m      # ❌ 既定10分・無出力で Too long with no output（おおよそ10〜11分）
      - reproduce-timeout-fixed-default-10m # ✅ 12m 延長で11分無出力でも成功（同上くらいの時間）