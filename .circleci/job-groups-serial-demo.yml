# =============================================================
# Job Groups + serial-group 検証用 CircleCI config
# （記事: CircleCI Job Groups で複数ジョブをまとめて直列化する）
# =============================================================
#
# 背景:
#   main へのマージが連続すると、別パイプラインの deploy が先行処理に割り込み、
#   デプロイ結果が想定外のバージョンで上書きされる race が起き得ます。
#   単一ジョブの serial-group だけでは deploy → release のまとまりを
#   1 単位としてロックできません。Job Groups とワークフロー側の serial-group で
#   グループ全体を atomic に直列化します。
#
# このリポジトリ（ci-sandboxes）では GitHub App 連携により複数の config を
# パイプラインごとに割り当て可能です。本ファイルは .circleci/ 直下の他デモ
# （no-op.yml / timeout.yml / terminal-demo.yml など）と同様、専用パイプラインで
# `.circleci/job-groups-serial-demo.yml` を参照するよう CircleCI プロジェクト設定してください。
#
# 含めるワークフロー（1 本）:
#   - job-groups-deploy-serial … build ‖ test → deploy-and-release（serial-group）
#
# 使い方:
#   1. 上記のとおりパイプラインの config パスを本ファイルに設定
#   2. パイプラインを 2 本連続で起動（手動または main へ短時間で 2 回 push）
#
# 記事との検証対応:
#   [ ] ワークフローグラフに鍵アイコン付き serial-start / serial-end が現れる
#   [ ] 完了グラフ: build・test 並列 → serial-start → deploy → release → serial-end
#   [ ] 2 本目のパイプライン: 先発が deploy 中は後発の serial-start 以降が Queued
#       （ジョブ詳細に Serial Key / Queue Depth / Queue Position が表示される）
#   [ ] serial-group は job-groups 定義ではなく、ワークフロー内のグループ参照に付く
#   [ ] deploy の Rerun: 「from start」「with SSH」のみ有効。from failed 等はグレーアウト
#   [ ] グループ内ジョブの Rerun はグループ全体が再実行される（release も含む）
#   [ ] グループ外の build を Rerun しても deploy-and-release は影響しない
#
# ハマりどころ:
#   · serial-group の値は << pipeline.project.slug >>/deploy-group で同一プロジェクト内のみ直列化
#   · 同一 serial-group の待機は最大 5 時間。検証用に deploy / release は sleep 30s
#
# 参考:
#   https://circleci.com/docs/guides/orchestrate/controlling-serial-execution-across-your-organization/
#   https://circleci.com/docs/reference/configuration-reference/#job-groups
#   https://circleci.com/changelog/job-groups-serialize-multiple-jobs-as-one-unit/
# =============================================================

version: 2.1

executors:
  base-small:
    docker:
      - image: cimg/base:current
    resource_class: small

jobs:
  build:
    executor: base-small
    steps:
      - checkout
      - run: echo "build 完了"

  test:
    executor: base-small
    steps:
      - checkout
      - run: echo "test OK"

  deploy:
    executor: base-small
    steps:
      - checkout
      - run: |
          echo "deploy 開始"
          sleep 30
          echo "deploy 完了"

  release:
    executor: base-small
    steps:
      - checkout
      - run: |
          echo "release 開始"
          sleep 30
          echo "release 完了"

job-groups:
  deploy-and-release:
    jobs:
      - deploy
      - release:
          requires:
            - deploy

workflows:
  job-groups-deploy-serial:
    jobs:
      - build
      - test
      - deploy-and-release:
          serial-group: << pipeline.project.slug >>/deploy-group
          requires:
            - build
            - test
