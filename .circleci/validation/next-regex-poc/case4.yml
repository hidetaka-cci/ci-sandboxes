version: 2.1
jobs:
  build:
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      - when:
          condition:
            matches:
              pattern: "^(?!main).*$"
              value: << pipeline.git.branch >>
          steps:
            - run: echo "not main"
workflows:
  test:
    jobs:
      - build
