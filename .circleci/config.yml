# =============================================================
# chunk task run 検証用 config
# =============================================================
#
# 検証A/A4: on_fail 非対話起動・success 時の非発火
# 検証C1/C2: 実バグに対する自律修正（プロンプト比較）
#
# 環境変数（CircleCI プロジェクト設定で登録）:
#   CIRCLECI_TOKEN           … 個人 API トークン（All API scopes）
#   CHUNK_TASK_DEFINITION    … タスク定義名または UUID
# =============================================================

version: 2.1

parameters:
  chunk_cli_version:
    type: string
    default: "0.7.109"

executors:
  base-small:
    docker:
      - image: cimg/base:current
    resource_class: small
  node-small:
    docker:
      - image: cimg/node:lts
    resource_class: small

commands:
  install-chunk-cli:
    parameters:
      version:
        type: string
        default: << pipeline.parameters.chunk_cli_version >>
    steps:
      - run:
          name: Install chunk CLI
          command: |
            set -euo pipefail
            CHUNK_VERSION="<< parameters.version >>"
            ARCH="$(uname -m)"
            case "$ARCH" in
              x86_64) CHUNK_ARCH="x86_64" ;;
              aarch64|arm64) CHUNK_ARCH="arm64" ;;
              *) echo "Unsupported architecture: $ARCH"; exit 1 ;;
            esac
            URL="https://github.com/CircleCI-Public/chunk-cli/releases/download/v${CHUNK_VERSION}/chunk-cli_Linux_${CHUNK_ARCH}.tar.gz"
            curl -fsSL "$URL" | tar -xzf - -C /tmp
            sudo mv /tmp/chunk /usr/local/bin/chunk
            chunk --version

  trigger-chunk-task-on-fail:
    description: Run chunk task run (invoke individual steps with when on_fail)
    parameters:
      prompt:
        type: string
    steps:
      - run:
          name: Verify chunk auth (on_fail)
          when: on_fail
          command: |
            set -euo pipefail
            if [ -z "${CIRCLECI_TOKEN:-}" ] && [ -z "${CIRCLE_TOKEN:-}" ]; then
              echo "CIRCLECI_TOKEN or CIRCLE_TOKEN must be set in project env vars"
              exit 1
            fi
            chunk auth status
      - run:
          name: Trigger chunk task run (on_fail)
          when: on_fail
          command: |
            set -euo pipefail
            chunk task run \
              --definition "${CHUNK_TASK_DEFINITION}" \
              --prompt "<< parameters.prompt >>" \
              --json

jobs:
  # -------------------------------------------------------
  # 検証A: 意図的失敗 → on_fail で chunk task run
  # -------------------------------------------------------
  on-fail-trigger:
    executor: base-small
    steps:
      - checkout
      - install-chunk-cli
      - run:
          name: Intentionally fail (to fire on_fail steps)
          command: |
            echo "Failing intentionally for chunk task on_fail validation"
            exit 1
      - trigger-chunk-task-on-fail:
          prompt: >-
            CI validation: this prompt was sent from a CircleCI on_fail step
            via chunk task run. Reply with exactly one line: CI validation OK.

  # -------------------------------------------------------
  # 検証A4: 成功時に on_fail が発火しないこと
  # -------------------------------------------------------
  success-control:
    executor: base-small
    steps:
      - checkout
      - install-chunk-cli
      - run:
          name: Job succeeds intentionally
          command: 'echo "success-control job completed successfully"'
      - run:
          name: on_fail step must NOT run on success
          when: on_fail
          command: |
            echo "UNEXPECTED: on_fail step ran on a successful job"
            exit 1

  # -------------------------------------------------------
  # 検証C1: 原因を書かないプロンプトで自律修正できるか
  # -------------------------------------------------------
  bug-fix-c1:
    executor: node-small
    steps:
      - checkout
      - install-chunk-cli
      - run:
          name: Install dependencies
          command: npm ci
      - run:
          name: Run tests
          command: npm test 2>&1 | tee /tmp/test-output.txt
      - run:
          name: Trigger chunk task run - C1 vague prompt (on_fail)
          when: on_fail
          command: |
            set -euo pipefail
            chunk task run \
              --definition "${CHUNK_TASK_DEFINITION}" \
              --prompt "このリポジトリのCIテストが失敗しています。原因を特定してコードを修正してください。" \
              --json

  # -------------------------------------------------------
  # 検証C2: テストログをプロンプトに埋め込んで自律修正できるか
  # -------------------------------------------------------
  bug-fix-c2:
    executor: node-small
    steps:
      - checkout
      - install-chunk-cli
      - run:
          name: Install dependencies
          command: npm ci
      - run:
          name: Run tests (capture output)
          command: npm test 2>&1 | tee /tmp/test-output.txt
      - run:
          name: Trigger chunk task run - C2 log-embedded prompt (on_fail)
          when: on_fail
          command: |
            set -euo pipefail
            TEST_LOG=$(tail -80 /tmp/test-output.txt 2>/dev/null || echo "test output unavailable")
            PROMPT=$(printf 'CIのテストが失敗しました。以下のテストログを参照して原因を特定し、コードを修正してください。テストのスキップや削除で通すことは禁止します。\n\nテストログ:\n%s' "${TEST_LOG}")
            chunk task run \
              --definition "${CHUNK_TASK_DEFINITION}" \
              --prompt "${PROMPT}" \
              --json

workflows:
  # 検証A
  chunk-task-on-fail:
    jobs:
      - on-fail-trigger

  # 検証A4
  chunk-task-success-control:
    jobs:
      - success-control

  # 検証C1
  chunk-task-bug-fix-c1:
    jobs:
      - bug-fix-c1

  # 検証C2
  chunk-task-bug-fix-c2:
    jobs:
      - bug-fix-c2
